name: Tests

on:
  workflow_run:
    workflows: ["Build"]
    types:
      - completed

jobs:
  tests:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        project:
          - src/CommonFramework/CommonFramework.Tests
          - src/CommonFramework/CommonFramework.DependencyInjection.Tests
          - src/CommonFramework/CommonFramework.IdentitySource.Tests
          - src/CommonFramework/CommonFramework.VisualIdentitySource.Tests
          - src/GenericQueryable/GenericQueryable.UnitTests
          - src/GenericQueryable/GenericQueryable.IntegrationTests.NHibernate
          - src/GenericQueryable/GenericQueryable.IntegrationTests.EntityFramework
          - src/HierarchicalExpand/HierarchicalExpand.Tests
          - src/HierarchicalExpand/HierarchicalExpand.IntegrationTests.NHibernate
          - src/HierarchicalExpand/HierarchicalExpand.IntegrationTests.EntityFramework
          - src/SecuritySystem/SecuritySystem.DiTests
          - src/SecuritySystem/_Example/ExampleApp.IntegrationTests.NHibernate
          - src/SecuritySystem/_Example/ExampleApp.IntegrationTests.EntityFramework
          - src/OData/OData.Tests

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Run tests
        run: dotnet test ${{ matrix.project }} --no-build -c Release --verbosity normal