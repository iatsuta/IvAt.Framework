name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        working-directory: ./src
        run: dotnet restore IvAt.Framework.slnx

      - name: Build
        working-directory: ./src
        run: dotnet build IvAt.Framework.slnx -c Release --no-restore